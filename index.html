<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>云服务监控</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
        background: linear-gradient(135deg, #1a1f2e 0%, #16213e 50%, #0f3460 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #e8eaf6;
      }
      .container { text-align: center; padding: 40px; max-width: 480px; }
      h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 10px; letter-spacing: 0.5px; }
      .subtitle { font-size: 0.95rem; opacity: 0.6; margin-bottom: 40px; }
      .providers { display: flex; flex-direction: column; gap: 12px; margin-bottom: 32px; }
      .provider-card {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 10px;
        padding: 14px 18px;
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 0.9rem;
      }
      .dot {
        width: 8px; height: 8px;
        border-radius: 50%;
        background: #555;
        animation: pulse 1.6s ease-in-out infinite;
        flex-shrink: 0;
      }
      @keyframes pulse {
        0%,100% { opacity: 0.3; }
        50%      { opacity: 1; }
      }
      .hint { font-size: 0.8rem; opacity: 0.4; line-height: 1.6; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>云服务监控</h1>
      <p class="subtitle">正在连接各服务，请在各登录窗口中完成登录...</p>
      <div class="providers">
        <div class="provider-card"><span class="dot"></span>阿里云百炼 · 等待登录</div>
        <div class="provider-card"><span class="dot"></span>百度千帆 · 等待登录</div>
      </div>
      <p class="hint">登录后窗口将自动收起，信息将显示在桌面悬浮卡片中<br>可通过系统托盘图标管理</p>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
