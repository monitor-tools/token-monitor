name: Release

# 当推送 v 开头的 tag 时触发，例如: v1.0.0, v1.0.1
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'codeplan 余量小工具 ${{ github.ref_name }}'
          releaseBody: |
            ##
             授权提醒与免责声明:
              **你使用本软件即授权本软件代替你手动向云厂商发送http请求，
              所获取信息仅会用于在你安装电脑上进行展示，
              本软件不会主动上传任何信息，功能仅是代替你手动定时获取数据并展示。**

              **本软件为非盈利软件，如有侵权，请联系提供材料证明后会对应删除适配。**
           
            ## 🍎 macOS 安装注意事项:

            1. 双击打开 `.dmg` 文件
            2. 将应用图标拖拽到 `Applications` 文件夹
            3. 前往 `Applications` 文件夹，找到应用
            4. **首次打开**：按住 `Control` 键点击应用 → 选择"打开" → 点击"打开"
            5. 后续可正常双击启动
            
            > ⚠️ 由于应用未签名，直接双击会被 macOS 阻止，请使用上述方法首次打开

            ## windows 下载后可以直接点击`msi`安装.
            
            ## ✨ 更新内容
            
            查看完整更新日志请访问提交记录。

            **完整更新日志**: https://github.com/${{ github.repository }}/compare/${{ github.ref_name }}...HEAD
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
