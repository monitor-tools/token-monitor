<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Code Plan 套餐余量监控</title>
    <style>
      /* ── Reset ─────────────────────────────────────────────────────────────── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        width: 100%; height: 100%;
        background: transparent;
        overflow: hidden;
        font-family: "Microsoft YaHei", "PingFang SC", "Helvetica Neue", sans-serif;
        user-select: none;
        -webkit-user-select: none;
      }

      /* ── 展开状态：完整卡片 ──────────────────────────────────────────────────── */
      .card {
        position: absolute;
        inset: 0;
        border-radius: 14px;
        background: rgba(16, 20, 28, 0.75);
        border: 1px solid rgba(255, 255, 255, 0.13);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        color: #eef2ff;
        display: flex;
        flex-direction: column;
        cursor: move;
      }

      /* ── 顶部标题栏（带 Provider 切换 Tab）───────────────────────────────────── */
      .drag-bar {
        flex-shrink: 0;
        height: 36px;
        display: flex;
        align-items: center;
        padding: 0 10px;
        gap: 6px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.10);
      }

      .tabs {
        display: flex;
        gap: 4px;
        flex: 1;
        overflow: hidden;
      }

      .tab {
        padding: 3px 9px;
        border-radius: 6px;
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
        opacity: 0.55;
        white-space: nowrap;
        transition: opacity .15s, background .15s;
      }
      .tab:hover { opacity: 0.85; background: rgba(255,255,255,0.08); }
      .tab.active {
        opacity: 1;
        background: rgba(255, 255, 255, 0.14);
      }
      /* 状态点（已有数据 = 绿色，未连接 = 灰色）*/
      .tab::before {
        content: '';
        display: inline-block;
        width: 5px; height: 5px;
        border-radius: 50%;
        background: #555;
        margin-right: 5px;
        vertical-align: middle;
      }
      .tab.connected::before { background: #52e36a; }

      .drag-tip {
        flex-shrink: 0;
        font-size: 13px;
        opacity: 0.3;
        letter-spacing: -1px;
      }

      /* ── 数据内容区 ──────────────────────────────────────────────────────────── */
      .content {
        flex: 1;
        padding: 10px 14px 0; /* 底部内边距改为 0 */
        overflow: hidden;
      }

      .waiting {
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        opacity: 0.45;
        gap: 8px;
      }
      .waiting::before {
        content: '';
        display: inline-block;
        width: 8px; height: 8px;
        border-radius: 50%;
        background: #555;
        animation: pulse 1.4s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.3; }
        50%       { opacity: 1;   }
      }

      .row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 8px;
        margin-bottom: 6px; /* 减小行间距：8px -> 6px */
        font-size: 12px;
        line-height: 1.6;
      }
      .row:last-child { margin-bottom: 0; }

      .k { opacity: 0.65; flex-shrink: 0; }
      .v {
        text-align: right;
        max-width: 60%;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        font-variant-numeric: tabular-nums;
      }
      .v.hi { color: #60f080; font-weight: 700; }

      .updated {
        margin-top: 6px;
        margin-bottom: 10px; /* 添加底部边距，避免紧贴边框 */
        font-size: 10px;
        opacity: 0.35;
        text-align: right;
      }

      /* ── 配额分组（百度千帆等三段配额）──────────────────────────────────────────── */
      .quota-section {
        margin-top: 8px; /* 减小上边距：10px -> 8px */
        padding-top: 8px; /* 减小上内边距：10px -> 8px */
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }

      .quota-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px; /* 减小间距：8px -> 6px */
      }

      .quota-group {
        background: rgba(255, 255, 255, 0.04);
        border-radius: 6px;
        padding: 6px 5px 5px; /* 减小内边距：7px 5px 6px -> 6px 5px 5px */
        text-align: center;
      }

      .quota-group-label {
        font-size: 9px;
        color: rgba(238, 242, 255, 0.45);
        margin-bottom: 4px;
        letter-spacing: 0.2px;
      }

      .quota-group-usage {
        font-size: 10px;
        color: rgba(238, 242, 255, 0.6);
        margin-bottom: 3px;
        font-variant-numeric: tabular-nums;
      }

      .quota-group-bar {
        width: 70%;
        margin: 0 auto 4px;
        height: 2px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 1px;
        overflow: hidden;
      }

      .quota-group-bar-fill {
        height: 100%;
        border-radius: 1px;
        background: #52e36a;
        transition: width 0.4s;
      }

      .quota-group.warn .quota-group-bar-fill { background: #ff6b6b; }

      .quota-group-remain {
        font-size: 12px;
        font-weight: 700;
        color: #60f080;
        font-variant-numeric: tabular-nums;
      }

      .quota-group-remain.warn { color: #ff7070; }

      /* ── 模式切换按钮（pin 和 close 共用）──────────────────────────────────────── */
      .mode-btn {
        flex-shrink: 0;
        width: 14px;
        height: 14px;
        border: none;
        background: transparent;
        color: rgba(238, 242, 255, 0.3);
        cursor: pointer;
        font-size: 8px;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 2px;
        line-height: 1;
        transition: color 0.15s, background 0.15s;
        position: relative;
        top: 1px; /* 向下偏移1px */
      }
      .mode-btn:hover {
        color: rgba(238, 242, 255, 0.85);
        background: rgba(255, 255, 255, 0.09);
      }
      .mode-btn.pinned {
        color: #60f080;
        background: rgba(96, 240, 128, 0.15);
      }
      .mode-btn.pinned:hover {
        color: #60f080;
        background: rgba(96, 240, 128, 0.25);
      }
    </style>
  </head>
  <body>
    <!-- ── 展开卡片 ─────────────────────────────────────────────────────────── -->
    <div class="card" id="card">
      <div class="drag-bar">
        <div class="tabs" id="tabs"></div>
        <!-- 置顶按钮：切换窗口置顶状态 -->
        <button class="mode-btn" id="pinBtn" title="取消置顶" onclick="togglePin()" onmousedown="event.stopPropagation()">&#x1F4CC;</button>
        <!-- 关闭按钮：隐藏窗口 -->
        <button class="mode-btn" id="closeBtn" title="关闭" onclick="closeWindow()" onmousedown="event.stopPropagation()">&#x2715;</button>
      </div>
      <div class="content" id="content">
        <div class="waiting">等待连接...</div>
      </div>
    </div>

    <script>
      // ── 状态 ────────────────────────────────────────────────────────────────
      /** @type {Record<string, {provider_id:string, provider_name:string, items:{key:string,value:string,highlight:boolean}[], compact_text:string}>} */
      const store = {};
      let activeId = null;

      // ── 渲染函数 ─────────────────────────────────────────────────────────────
      function renderTabs() {
        const el = document.getElementById('tabs');
        el.innerHTML = '';
        for (const [id, data] of Object.entries(store)) {
          const tab = document.createElement('div');
          tab.className = 'tab connected' + (id === activeId ? ' active' : '');
          tab.textContent = data.provider_name;
          tab.dataset.id = id;
          tab.addEventListener('click', () => selectProvider(id));
          el.appendChild(tab);
        }
      }

      function renderContent() {
        const el = document.getElementById('content');
        const data = store[activeId];
        if (!data) {
          el.innerHTML = '<div class="waiting">等待连接...</div>';
          adjustWindowHeight();
          return;
        }

        // ── 基本信息行 ──
        const rows = (data.items || []).map(item =>
          `<div class="row">
            <div class="k">${escHtml(item.key)}</div>
            <div class="v${item.highlight ? ' hi' : ''}">${escHtml(item.value)}</div>
          </div>`
        ).join('');

        // ── 配额分组（近5小时 / 近一周 / 近一月）──
        let quotaHtml = '';
        if (data.quota_groups && data.quota_groups.length > 0) {
          const groups = data.quota_groups.map(g => {
            const pct      = g.limit > 0 ? Math.min(100, (g.used / g.limit) * 100).toFixed(1) : 0;
            const groupCls = g.highlight ? 'quota-group warn' : 'quota-group';
            const remCls   = g.highlight ? 'quota-group-remain warn' : 'quota-group-remain';

            // 如果有限额，显示完整的配额信息；否则只显示已用量
            if (g.limit > 0) {
              return `<div class="${groupCls}">
                <div class="quota-group-label">${escHtml(g.label)}</div>
                <div class="quota-group-usage">${formatNum(g.used)}/${formatNum(g.limit)}</div>
                <div class="quota-group-bar"><div class="quota-group-bar-fill" style="width:${pct}%"></div></div>
                <div class="${remCls}">剩 ${formatNum(g.remain)}</div>
              </div>`;
            } else {
              return `<div class="${groupCls}">
                <div class="quota-group-label">${escHtml(g.label)}</div>
                <div class="${remCls}" style="margin-top: 8px;">${escHtml(g.used)}</div>
              </div>`;
            }
          }).join('');
          quotaHtml = `<div class="quota-section"><div class="quota-grid">${groups}</div></div>`;
        }

        // ── 最后更新时间（优先使用数据携带的时间戳）──
        const ts = data.updated_at
          ? new Date(data.updated_at).toLocaleTimeString('zh-CN', { hour12: false })
          : new Date().toLocaleTimeString('zh-CN', { hour12: false });

        el.innerHTML = rows + quotaHtml + `<div class="updated">更新于 ${ts}</div>`;

        // 内容渲染完成后调整窗口高度
        requestAnimationFrame(() => adjustWindowHeight());
      }

      function selectProvider(id) {
        if (!store[id]) return;
        activeId = id;
        renderTabs();
        renderContent();
        notifyActiveTab();
      }

      /** 通知 Rust 当前激活的 TAB 信息（用于更新任务栏组件和托盘标题） */
      async function notifyActiveTab() {
        try {
          if (!activeId || !store[activeId]) return;
          if (typeof window.__TAURI__ === 'undefined') return;
          const data = store[activeId];
          const keys = Object.keys(store);
          const tabIndex = keys.indexOf(activeId) + 1; // 1-based
          const { getCurrentWebviewWindow } = window.__TAURI__.webviewWindow;
          const webview = getCurrentWebviewWindow();
          await webview.emit('overlay_active_tab_changed', {
            provider_id:   data.provider_id,
            provider_name: data.provider_name || '',
            tab_index:     tabIndex,
            tab_count:     keys.length,
            compact_text:  data.compact_text  || '',
            quota_groups:  data.quota_groups  || []
          });
          console.log('[overlay] notifyActiveTab:', data.provider_id, 'tab:', tabIndex, '/', keys.length);
        } catch (e) {
          console.error('[overlay] notifyActiveTab error:', e);
        }
      }

      // ── 公共 API（由 Rust 通过 eval 调用）────────────────────────────────────

      /**
       * 接收来自任意 Provider 的数据并更新 UI
       * @param {{ provider_id:string, provider_name:string, items:Array, compact_text:string }} data
       */
      window.updateProviderData = function (data) {
        if (!data?.provider_id) return;
        store[data.provider_id] = data;
        if (!activeId) activeId = data.provider_id;
        renderTabs();
        renderContent();
        // 仅当更新的是当前激活的 TAB 时才通知 Rust 侧更新任务栏/托盘
        if (data.provider_id === activeId) {
          notifyActiveTab();
        }
      };

      /** 调整窗口高度以适应内容 */
      async function adjustWindowHeight() {
        try {
          const dragBar = document.querySelector('.drag-bar');
          const content = document.querySelector('.content');
          if (!dragBar || !content) return;

          // 计算实际内容高度：
          // 1. 标题栏高度
          const dragBarHeight = 36; // .drag-bar 固定高度

          // 2. 内容区域的实际高度（包括所有子元素）
          // 使用临时容器测量真实高度，避免被当前窗口限制
          const tempContainer = document.createElement('div');
          tempContainer.style.cssText = 'position:absolute;visibility:hidden;width:328px;'; // 340 - 12 (padding)
          tempContainer.innerHTML = content.innerHTML;
          document.body.appendChild(tempContainer);

          // 获取内容实际高度 + padding
          const contentPadding = 10 + 14 + 0; // padding: 10px 14px 0
          const actualContentHeight = tempContainer.scrollHeight + contentPadding;

          document.body.removeChild(tempContainer);

          // 3. 计算总高度 = 标题栏 + 内容
          const totalHeight = dragBarHeight + actualContentHeight;
          const totalWidth = 340; // EXPANDED_W - 固定宽度

          const { getCurrentWebviewWindow } = window.__TAURI__.webviewWindow;
          const webview = getCurrentWebviewWindow();

          // 发送调整尺寸事件到 Rust
          await webview.emit('overlay_adjust_size', {
            width: totalWidth,
            height: totalHeight
          });

          console.log('[overlay] Adjusted size:', totalWidth, 'x', totalHeight, 'dragBar:', dragBarHeight, 'content:', actualContentHeight);
        } catch (e) {
          console.error('[overlay] adjustWindowHeight error:', e);
        }
      }

      /** 关闭（隐藏）窗口 */
      async function closeWindow() {
        console.log('[overlay] closeWindow called');
        try {
          if (typeof window.__TAURI__ === 'undefined') {
            console.error('[overlay] Tauri API not loaded yet');
            setTimeout(closeWindow, 100);
            return;
          }

          if (!window.__TAURI__.webviewWindow) {
            console.error('[overlay] webviewWindow module not available');
            return;
          }

          const { getCurrentWebviewWindow } = window.__TAURI__.webviewWindow;
          if (!getCurrentWebviewWindow) {
            console.error('[overlay] getCurrentWebviewWindow not available');
            return;
          }

          const webview = getCurrentWebviewWindow();
          const result = await webview.hide();
          console.log('[overlay] Window hidden successfully, result:', result);
        } catch (e) {
          console.error('[overlay] closeWindow error:', e);
          console.error('[overlay] Error name:', e.name);
          console.error('[overlay] Error message:', e.message);
          if (e.stack) {
            console.error('[overlay] Error stack:', e.stack);
          }
        }
      }

      /** 置顶按钮点击 → 发送切换置顶事件到 Rust */
      async function togglePin() {
        console.log('[overlay] togglePin called');
        try {
          const { getCurrentWebviewWindow } = window.__TAURI__.webviewWindow;
          const webview = getCurrentWebviewWindow();
          await webview.emit('overlay_toggle_pin');
          console.log('[overlay] Pin toggle event emitted successfully');
        } catch (e) {
          console.error('[overlay] togglePin error:', e);
        }
      }

      /** 更新置顶按钮状态（由 Rust 调用）*/
      window.updatePinState = function(isPinned) {
        const btn = document.getElementById('pinBtn');
        if (btn) {
          btn.title = isPinned ? '取消置顶' : '置顶窗口';
          if (isPinned) {
            btn.classList.add('pinned');
          } else {
            btn.classList.remove('pinned');
          }
        }
      };

      // 页面加载完成后，请求初始置顶状态并设置拖动
      window.addEventListener('DOMContentLoaded', async () => {
        try {
          const { getCurrentWebviewWindow } = window.__TAURI__.webviewWindow;
          const webview = getCurrentWebviewWindow();
          await webview.emit('overlay_request_pin_state');
        } catch (e) {
          console.error('[overlay] Failed to request pin state:', e);
        }

        setupDragging();
      });

      /** 设置窗口拖动功能 */
      function setupDragging() {
        console.log('[overlay] Setting up dragging...');

        const card = document.getElementById('card');
        if (card) {
          card.addEventListener('mousedown', async (e) => {
            // 排除按钮、tab 和双击
            if (e.target.closest('.mode-btn') || e.target.closest('.tab')) return;
            if (e.detail === 2) return;
            if (e.button !== 0) return;
            try {
              const { getCurrentWebviewWindow } = window.__TAURI__.webviewWindow;
              const webview = getCurrentWebviewWindow();
              await webview.startDragging();
            } catch (e) {
              console.error('[overlay] startDragging error:', e);
            }
          });
        } else {
          console.error('[overlay] Card element not found!');
        }
      }

      // ── 工具 ─────────────────────────────────────────────────────────────────
      function formatNum(n) {
        const num = Number(n);
        if (isNaN(num)) return String(n ?? '--');
        if (num >= 10000) return (num / 10000).toFixed(1) + 'w';
        return String(num);
      }

      function escHtml(str) {
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
      }
    </script>
  </body>
</html>
